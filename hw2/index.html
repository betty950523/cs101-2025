<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HW#2 資工選課表</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 30px;
      color: #333;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 48px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 18px;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ddd;
    }

    th {
      padding-top: 12px;
      padding-bottom: 12px;
      background-color: #04AA6D;
      color: white;
      font-size: 20px;
    }

    .course {
      cursor: pointer;
      text-decoration: underline;
    }

    button {
      margin-top: 12px;
      padding: 6px 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      z-index: 999;
    }

    .popover {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92%;
      max-width: 1200px;
      height: 86vh;
      background: #f5f5f5;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      border-radius: 6px;
      z-index: 1000;
      overflow-y: auto;
    }

    .popover-header {
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      padding: 18px 20px;
      font-size: 28px;
      font-weight: bold;
      color: #555;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-icons {
      color: #b57a36;
      font-size: 26px;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .close-x {
      color: #888;
      cursor: pointer;
      font-size: 30px;
      margin-left: 12px;
    }

    .tabs {
      display: flex;
      gap: 14px;
      padding: 18px 14px 12px 14px;
      background: #f5f5f5;
      position: sticky;
      top: 73px;
      z-index: 15;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 8px;
      border: 2px solid #e4a54a;
      border-radius: 12px;
      color: #666;
      background: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    .tab.active {
      color: #555;
      font-weight: bold;
      background: #fff;
    }

    .tab.inactive {
      border: none;
      border-bottom: 2px solid #e4a54a;
      border-radius: 0;
      background: transparent;
    }

    .panel-content {
      padding: 0 16px 20px 16px;
    }

    .info-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      border: 1px solid #e3e3e3;
      margin-bottom: 4px;
      background: #fafafa;
    }

    .info-label {
      padding: 16px 14px;
      font-size: 18px;
      line-height: 1.5;
      color: #444;
      background: #f8f8f8;
    }

    .info-value {
      padding: 16px 14px;
      font-size: 18px;
      line-height: 1.5;
      background: #fafafa;
    }

    .small-link {
      color: #b57a36;
      cursor: pointer;
    }

    .schedule-box {
      background: #efeff2;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #e2e2e2;
      margin-top: 4px;
    }

    .schedule-header,
    .schedule-row {
      display: grid;
      grid-template-columns: 120px 320px 1fr 160px;
    }

    .schedule-header div {
      font-weight: bold;
      padding: 16px 12px;
      font-size: 18px;
      background: #efeff2;
    }

    .schedule-row div {
      padding: 16px 12px;
      font-size: 18px;
      background: white;
      border-top: 1px solid #ececec;
      border-right: 1px solid #ececec;
      line-height: 1.5;
    }

    .schedule-row div:last-child,
    .schedule-header div:last-child {
      border-right: none;
    }

    .close-area {
      padding: 16px 0 10px 0;
      text-align: right;
    }

    .close-btn {
      background: #04AA6D;
      color: white;
      border: none;
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>資工選課表</h1>

  <table id="csie">
    <tr>
      <th>開課單位</th>
      <th>課程名稱</th>
      <th>授課教師</th>
    </tr>

    <tr>
      <td>資工系</td>
      <td class="course" onclick="course1()">物件導向軟體設計</td>
      <td>黃崇源</td>
    </tr>

    <tr>
      <td>資工系</td>
      <td class="course" onclick="course2()">離散數學</td>
      <td>林仲志</td>
    </tr>

    <tr>
      <td>資工系</td>
      <td class="course" onclick="course3()">作業系統實務</td>
      <td>張哲維</td>
    </tr>

    <tr>
      <td>資工系</td>
      <td class="course" onclick="course4()">AI程式語言</td>
      <td>馬誠佑</td>
    </tr>

    <tr>
      <td>資工系</td>
      <td class="course" onclick="course5()">通訊系統</td>
      <td>陳仁暉</td>
    </tr>

    <tr>
      <td>資工系</td>
      <td class="course" onclick="course6()">軟硬體專題(2)</td>
      <td>黃崇源</td>
    </tr>
  </table>

  <button onclick="changeResult()">Change</button>

  <div id="overlay" class="overlay" onclick="closePop()"></div>
  <div id="pop" class="popover"></div>

  <script>
    function changeResult() {
      var table = document.getElementById("csie");
      table.rows[1].cells[2].innerHTML = "李春良";
    }

    function openPop(html) {
      document.getElementById("pop").innerHTML = html;
      document.getElementById("pop").style.display = "block";
      document.getElementById("overlay").style.display = "block";
    }

    function closePop() {
      document.getElementById("pop").style.display = "none";
      document.getElementById("overlay").style.display = "none";
    }

    function makeModal(data) {
      return `
        <div class="popover-header">
          <span>課程詳細資料</span>
          <div class="header-icons">
            <span>🖨️</span>
            <span>↗</span>
            <span class="close-x" onclick="closePop()">×</span>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active">課程資訊</div>
          <div class="tab inactive">教學大綱</div>
          <div class="tab inactive">教學進度</div>
          <div class="tab inactive">先修課程</div>
        </div>

        <div class="panel-content">
          <div class="info-row">
            <div class="info-label">學年/學期</div>
            <div class="info-value">${data.semester}</div>
          </div>

          <div class="info-row">
            <div class="info-label">授課教師</div>
            <div class="info-value">${data.teacher}</div>
          </div>

          <div class="info-row">
            <div class="info-label">開課單位</div>
            <div class="info-value">${data.dept}</div>
          </div>

          <div class="info-row">
            <div class="info-label">年級-班別</div>
            <div class="info-value">${data.className}</div>
          </div>

          <div class="info-row">
            <div class="info-label">科目代號(學分)</div>
            <div class="info-value">${data.code}</div>
          </div>

          <div class="info-row">
            <div class="info-label">課程名稱</div>
            <div class="info-value">${data.course}</div>
          </div>

          <div class="info-row">
            <div class="info-label">開課序號</div>
            <div class="info-value">${data.section}</div>
          </div>

          <div class="info-row">
            <div class="info-label">主要開課序號</div>
            <div class="info-value">${data.mainSection}</div>
          </div>

          <div class="info-row">
            <div class="info-label">修課學生</div>
            <div class="info-value">${data.students}</div>
          </div>

          <div class="info-row">
            <div class="info-label">人數限制</div>
            <div class="info-value">${data.limit}</div>
          </div>

          <div class="info-row">
            <div class="info-label">上課時間地點</div>
            <div class="info-value">
              <div class="schedule-box">
                <div class="schedule-header">
                  <div>星期</div>
                  <div>開始 / 結束</div>
                  <div>教室 <span class="small-link">[代碼說明]</span></div>
                  <div></div>
                </div>

                <div class="schedule-row">
                  <div>${data.weekday}</div>
                  <div>${data.time}</div>
                  <div>${data.room}</div>
                  <div>${data.noteTime}</div>
                </div>
              </div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-label">核心能力</div>
            <div class="info-value"><span class="small-link">按此查詢</span></div>
          </div>

          <div class="info-row">
            <div class="info-label">備註</div>
            <div class="info-value">${data.remark}</div>
          </div>

          <div class="close-area">
            <button class="close-btn" onclick="closePop()">關閉</button>
          </div>
        </div>
      `;
    }

    function course1() {
      openPop(makeModal({
        semester: "114/2",
        teacher: "黃崇源",
        dept: "資工系",
        className: "3-甲",
        code: "IT3004(3)",
        course: "物件導向軟體設計",
        section: "A2337",
        mainSection: "",
        students: "本校: 64人；外校: 0人",
        limit: "10~60",
        weekday: "星期五",
        time: "2 (09:10) ~ 4 (12:00)",
        room: "資工系電腦教室2",
        noteTime: "每週上課",
        remark: ""
      }));
    }

    function course2() {
      openPop(makeModal({

    function course3() {

        section: "A2338",

        students: "本校: 43人；外校: 0人",
        limit: "10~60",
        weekday: "星期四",
        time: "2 (09:10) ~ 4 (12:00)",
        room: "資工系研討室6",
        noteTime: "每週上課",
        remark: ""
      }));
    }

    function course4() {
      openPop(makeModal({
        semester: "114/2",
        teacher: "馬誠佑",
        dept: "資工系",
        className: "1-甲",
        code: "IT1023(3)",
        course: "AI程式語言",
        section: "A2356",
        mainSection: "A2755",
        students: "本校: 25人；外校: 0人",
        limit: "10~60",
        weekday: "星期五",
        time: "5 (13:10) ~ 7 (16:00)",
        room: "B0301C",
        noteTime: "每週上課",
        remark: "與人工智慧學系合開。"
      }));
    }

    function course5() {
      openPop(makeModal({
        semester: "114/2",

    }

    function course6() {
      openPop(makeModal({
        semester: "114/2",

        remark: ""
      }));
    }
  </script>

</body>
</html>
